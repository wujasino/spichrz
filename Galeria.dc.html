<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <title>Galeria — Stary Spichrz, Chełmno</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    html,body{margin:0;padding:0;background:#FBF9F4;color:#1B1712;}
    body{font-family:'Jost',sans-serif;-webkit-font-smoothing:antialiased;}
    a{color:#1B1712;text-decoration:none;}
    a:hover{color:#8A6A48;}
    ::selection{background:#8A6A48;color:#fff;}
  </style>
</helmet>

<div style="min-width:1100px">

  <header data-screen-label="Nawigacja" style="position:sticky;top:0;z-index:50;background:rgba(251,249,244,0.94);backdrop-filter:blur(8px);border-bottom:1px solid #E8E1D4">
    <div style="max-width:1240px;margin:0 auto;padding:0 40px;height:76px;display:flex;align-items:center;justify-content:space-between;gap:32px">
      <a href="Start.dc.html" style="display:flex;align-items:baseline;gap:12px">
        <span style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;letter-spacing:0.02em">Stary Spichrz</span>
        <span style="font-size:11px;letter-spacing:0.22em;text-transform:uppercase;color:#8A6A48">1797</span>
      </a>
      <nav style="display:flex;align-items:center;gap:34px;font-size:14px;letter-spacing:0.08em;text-transform:uppercase">
        <a href="Start.dc.html">{{ t.navStart }}</a>
        <a href="Pokoje.dc.html">{{ t.navRooms }}</a>
        <a href="Restauracja.dc.html">{{ t.navRest }}</a>
        <a href="Galeria.dc.html" style="color:#8A6A48">{{ t.navGallery }}</a>
        <a href="Kontakt.dc.html">{{ t.navContact }}</a>
      </nav>
      <div style="display:flex;align-items:center;gap:18px">
        <button onClick="{{ toggleLang }}" style="background:none;border:1px solid #D8CFBF;border-radius:999px;padding:7px 16px;font-family:'Jost',sans-serif;font-size:12px;letter-spacing:0.14em;cursor:pointer;color:#1B1712" style-hover="border-color:#8A6A48;color:#8A6A48">{{ otherLang }}</button>
        <a href="{{ bookingUrl }}" target="_blank" style="background:#17130F;color:#FBF9F4;padding:12px 26px;font-size:13px;letter-spacing:0.14em;text-transform:uppercase" style-hover="background:#8A6A48;color:#fff">{{ t.navBook }}</a>
      </div>
    </div>
  </header>

  <section data-screen-label="Nagłówek galerii" style="max-width:1240px;margin:0 auto;padding:80px 40px 56px;text-align:center">
    <div style="font-size:13px;letter-spacing:0.26em;text-transform:uppercase;color:#8A6A48;margin-bottom:18px">{{ t.kicker }}</div>
    <h1 style="font-family:'Cormorant Garamond',serif;font-weight:600;font-size:60px;margin:0 0 22px">{{ t.title }}</h1>
    <p style="font-size:18px;font-weight:300;line-height:1.75;color:#4E463C;max-width:600px;margin:0 auto;text-wrap:pretty">{{ t.intro }}</p>
  </section>

  <section data-screen-label="Siatka zdjęć" style="max-width:1240px;margin:0 auto;padding:0 40px 100px">
    <div style="display:grid;grid-template-columns:1fr 1fr;grid-template-rows:480px 320px;gap:24px">
      <div style="grid-column:1 / -1">
        <x-import component-from-global-scope="image-slot" from="./image-slot.js" id="gal-fasada" shape="rect" src="assets/fasada.jpg" placeholder="Fasada" hint-size="100%,100%" style="width:100%;height:100%"></x-import>
      </div>
      <div>
        <x-import component-from-global-scope="image-slot" from="./image-slot.js" id="gal-pokoj-2" shape="rect" placeholder="Zdjęcie pokoju rodzinnego" hint-size="100%,100%" style="width:100%;height:100%"></x-import>
      </div>
      <div>
        <x-import component-from-global-scope="image-slot" from="./image-slot.js" id="gal-detal" shape="rect" placeholder="Detal architektoniczny" hint-size="100%,100%" style="width:100%;height:100%"></x-import>
      </div>
    </div>
  </section>

  <footer data-screen-label="Stopka" style="background:#17130F;color:#FBF9F4">
    <div style="max-width:1240px;margin:0 auto;padding:30px 40px;display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:300;color:#B7AC9C">
      <span>© 2026 Stary Spichrz Restauracja &amp; Noclegi</span>
      <span>Podmurna 7, 86-200 Chełmno · <a href="tel:+48537311090" style="color:#B99A72" style-hover="color:#FBF9F4">537 311 090</a></span>
    </div>
  </footer>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  constructor(props) {
    super(props);
    let saved = null;
    try { saved = localStorage.getItem('ss-lang'); } catch (e) {}
    this.state = { lang: saved || 'pl' };
  }

  renderVals() {
    const lang = this.state.lang;
    const T = {
      pl: {
        navStart: 'Start', navRooms: 'Pokoje', navRest: 'Restauracja', navGallery: 'Galeria', navContact: 'Kontakt', navBook: 'Rezerwuj',
        kicker: 'Galeria', title: 'Zdjęcia i wnętrza',
        intro: 'Zabytkowa architektura szachulcowa, przytulne pokoje i klimat starego Chełmna.',
      },
      en: {
        navStart: 'Home', navRooms: 'Rooms', navRest: 'Restaurant', navGallery: 'Gallery', navContact: 'Contact', navBook: 'Book now',
        kicker: 'Gallery', title: 'Photos & interiors',
        intro: 'Historic half-timbered architecture, cosy rooms and the atmosphere of old Chełmno.',
      },
    };

    return {
      t: T[lang],
      otherLang: lang === 'pl' ? 'EN' : 'PL',
      toggleLang: () => {
        const next = lang === 'pl' ? 'en' : 'pl';
        try { localStorage.setItem('ss-lang', next); } catch (e) {}
        this.setState({ lang: next });
      },
      bookingUrl: this.props.bookingUrl ?? 'https://www.booking.com/hotel/pl/stary-spichrz.html',
    };
  }
}
</script>
</body>
</html>

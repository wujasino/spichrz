  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

koje', navRest: 'Restauracja', navGallery: 'Galeria', navContact: 'Kontakt', navBook: 'Rezerwuj',\n        kicker: 'Galeria', title: 'Zdjęcia i wnętrza',\n        intro: 'Zabytkowa architektura szachulcowa, przytulne pokoje i klimat starego Chełmna.',\n        ftAddress: 'Adres', ftContact: 'Kontakt', ftHours: 'Doba hotelowa',\n        ftCheckin: 'Zameldowanie', ftCheckout: 'Wymeldowanie', ftDirections: 'Jak dojechać', ftCity: 'miasto zakochanych',\n      },\n      en: {\n        navStart: 'Home', navRooms: 'Rooms', navRest: 'Restaurant', navGallery: 'Gallery', navContact: 'Contact', navBook: 'Book now',\n        kicker: 'Gallery', title: 'Photos & interiors',\n        intro: 'Historic half-timbered architecture, cosy rooms and the atmosphere of old Chełmno.',\n        ftAddress: 'Address', ftContact: 'Contact', ftHours: 'Check-in / out',\n        ftCheckin: 'Check-in', ftCheckout: 'Check-out', ftDirections: 'Getting here', ftCity: 'the town of lovers',\n      },\n    };\n\n    return {\n      t: T[lang],\n      otherLang: lang === 'pl' ? 'EN' : 'PL',\n      toggleLang: () => {\n        const next = lang === 'pl' ? 'en' : 'pl';\n        try { localStorage.setItem('ss-lang', next); } catch (e) {}\n        this.setState({ lang: next });\n      },\n      bookingUrl: this.props.bookingUrl ?? 'https://www.booking.com/hotel/pl/stary-spichrz.html',\n    };\n  }\n}\n<\u002Fscript>\n\n<div id=\"ss-chat\">\n  <style>\n    #ss-chat{font-family:'Jost',sans-serif}\n    #ss-chat-toggle{position:fixed;bottom:24px;right:24px;z-index:400;width:56px;height:56px;border-radius:50%;background:#17130F;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(0,0,0,.25);transition:background .2s}\n    #ss-chat-toggle:hover{background:#8A6A48}\n    #ss-chat-toggle svg{width:26px;height:26px}\n    #ss-chat-panel{position:fixed;bottom:92px;right:24px;z-index:400;width:340px;max-width:calc(100vw - 32px);height:460px;max-height:calc(100vh - 140px);background:#FBF9F4;border:1px solid #E8E1D4;box-shadow:0 12px 40px rgba(0,0,0,.18);display:flex;flex-direction:column;overflow:hidden}\n    #ss-chat-panel[hidden]{display:none}\n    .ss-chat-head{background:#17130F;color:#FBF9F4;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;font-size:14px}\n    .ss-chat-head strong{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600}\n    .ss-chat-head button{background:none;border:none;color:#DAD2C4;font-size:22px;cursor:pointer;line-height:1;padding:2px 4px}\n    .ss-chat-head button:hover{color:#fff}\n    .ss-chat-body{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px}\n    .ss-chat-msg{max-width:82%;padding:10px 14px;font-size:14px;line-height:1.5;border-radius:2px;text-wrap:pretty}\n    .ss-chat-msg.bot{background:#F5F1E8;color:#1B1712;align-self:flex-start}\n    .ss-chat-msg.user{background:#17130F;color:#FBF9F4;align-self:flex-end}\n    .ss-chat-quick{display:flex;flex-wrap:wrap;gap:8px;padding:0 16px 12px}\n    .ss-chat-quick button{background:none;border:1px solid #D8CFBF;color:#4E463C;font-size:12px;padding:6px 12px;cursor:pointer;border-radius:999px;font-family:'Jost',sans-serif}\n    .ss-chat-quick button:hover{border-color:#8A6A48;color:#8A6A48}\n    .ss-chat-form{display:flex;border-top:1px solid #E8E1D4}\n    .ss-chat-form input{flex:1;border:none;background:none;padding:14px 16px;font-size:14px;font-family:'Jost',sans-serif;color:#1B1712;outline:none}\n    .ss-chat-form button{border:none;background:#17130F;color:#FBF9F4;padding:0 20px;font-size:13px;letter-spacing:.08em;text-transform:uppercase;cursor:pointer}\n    .ss-chat-form button:hover{background:#8A6A48}\n  <\u002Fstyle>\n  <button id=\"ss-chat-toggle\" aria-label=\"Otwórz czat\" aria-expanded=\"false\">\n    <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#FBF9F4\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z\"><\u002Fpath><\u002Fsvg>\n  <\u002Fbutton>\n  <div id=\"ss-chat-panel\" hidden>\n    <div class=\"ss-chat-head\">\n      <strong>Stary Spichrz<\u002Fstrong>\n      <button id=\"ss-chat-close\" aria-label=\"Zamknij\">&times;<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"ss-chat-body\" id=\"ss-chat-body\"><\u002Fdiv>\n    <div class=\"ss-chat-quick\" id=\"ss-chat-quick\"><\u002Fdiv>\n    <form class=\"ss-chat-form\" id=\"ss-chat-form\">\n      <input id=\"ss-chat-input\" type=\"text\" autocomplete=\"off\">\n      <button type=\"submit\">Wyślij<\u002Fbutton>\n    <\u002Fform>\n  <\u002Fdiv>\n<\u002Fdiv>\n<script>\n(function(){\n  var LANG = (function(){ try { return localStorage.getItem('ss-lang') || 'pl'; } catch(e){ return 'pl'; } })();\n\n  var STR = {\n    pl: {\n      greeting: 'Cześć! 👋 Jestem wirtualnym asystentem Starego Spichrza. Zapytaj mnie o ceny, godziny, parking, śniadanie czy rezerwację.',\n      placeholder: 'Napisz wiadomość…',\n      send: 'Wyślij',\n      quick: ['Ceny pokoi', 'Zameldowanie', 'Parking', 'Rezerwacja'],\n      fallback: 'Nie mam gotowej odpowiedzi na to pytanie 🙂 Zadzwoń do nas: 537 311 090 albo zarezerwuj online — chętnie pomożemy!'\n    },\n    en: {\n      greeting: \"Hi! 👋 I'm the virtual assistant of Stary Spichrz. Ask me about prices, hours, parking, breakfast or booking.\",\n      placeholder: 'Type a message…',\n      send: 'Send',\n      quick: ['Room prices', 'Check-in', 'Parking', 'Booking'],\n      fallback: \"I don't have a ready answer for that 🙂 Call us: 537 311 090 or book online — happy to help!\"\n    }\n  };\n\n  var FAQ = {\n    pl: [\n      { kw: ['cena', 'cennik', 'koszt', 'ile kosztuje', 'stawka', 'ceny'], a: 'Nasze pokoje kosztują od 296 zł (dwuosobowy), od 350 zł (rodzinny) i od 420 zł (apartament) za noc — śniadanie wliczone w cenę. Aktualną dostępność sprawdzisz przez przycisk „Rezerwuj”.' },\n      { kw: ['zameldowa', 'wymeldowa', 'check-in', 'check in', 'checkout', 'check-out', 'godzina przyjazdu', 'doba hotelowa'], a: 'Zameldowanie od 14:00, wymeldowanie do 11:00.' },\n      { kw: ['adres', 'gdzie', 'lokalizacj', 'jak dojechać', 'dojazd', 'znajdujecie'], a: 'Znajdujemy się przy Podmurna 7, 86-200 Chełmno — tuż przy murach starówki.' },\n      { kw: ['parking', 'auto', 'samoch'], a: 'Tak, oferujemy bezpłatny parking dla gości.' },\n      { kw: ['śniadan', 'sniadan'], a: 'Śniadanie jest wliczone w cenę pobytu dla gości pensjonatu.' },\n      { kw: ['restauracj', 'jedzeni', 'obiad', 'kolacj', 'kuchni', 'bar'], a: 'Tak! Nasza restauracja i bar serwują domowe dania kuchni polskiej i regionalnej — zapraszamy gości pensjonatu oraz osoby z zewnątrz.' },\n      { kw: ['wifi', 'wi-fi', 'internet'], a: 'Bezpłatne Wi-Fi jest dostępne w całym obiekcie.' },\n      { kw: ['rezerwacj', 'rezerwu', 'zarezerwowa', 'booking'], a: 'Rezerwację zrobisz przez przycisk „Rezerwuj” (Booking.com) lub telefonicznie: 537 311 090.' },\n      { kw: ['telefon', 'kontakt', 'zadzwoni', 'numer'], a: 'Zadzwoń do nas: 537 311 090.' },\n      { kw: ['transfer'], a: 'Oferujemy transfer hotelowy na życzenie — zapytaj podczas rezerwacji.' },\n      { kw: ['pokoj', 'pokój', 'pokoje', 'apartament'], a: 'Mamy sześć przytulnych pokoi: dwuosobowe, rodzinne i apartament — każdy z centralnym ogrzewaniem, łóżkiem podwójnym i sofą.' },\n      { kw: ['zwierz', 'pies', 'kot'], a: 'W sprawie pobytu ze zwierzakiem zadzwoń do nas: 537 311 090 — ustalimy szczegóły.' }\n    ],\n    en: [\n      { kw: ['price', 'cost', 'rate', 'how much'], a: 'Our rooms start at 296 zł (double), 350 zł (family) and 420 zł (apartment) per night — breakfast included. Check live availability via the \"Book now\" button.' },\n      { kw: ['check-in', 'check in', 'checkout', 'check-out', 'arrival', 'hours'], a: 'Check-in from 14:00, check-out by 11:00.' },\n      { kw: ['address', 'where', 'location', 'directions'], a: 'We are located at Podmurna 7, 86-200 Chełmno — right by the old town walls.' },\n      { kw: ['parking', 'car'], a: 'Yes, free parking is available for guests.' },\n      { kw: ['breakfast'], a: 'Breakfast is included in the rate for guesthouse guests.' },\n      { kw: ['restaurant', 'food', 'lunch', 'dinner', 'cuisine', 'bar'], a: 'Yes! Our restaurant and bar serve homemade Polish and regional dishes — open to guesthouse guests and visitors alike.' },\n      { kw: ['wifi', 'wi-fi', 'internet'], a: 'Free Wi-Fi is available throughout the property.' },\n      { kw: ['book', 'reservation', 'reserve'], a: 'Book via the \"Book now\" button (Booking.com) or by phone: 537 311 090.' },\n      { kw: ['phone', 'contact', 'call', 'number'], a: 'Give us a call: 537 311 090.' },\n      { kw: ['transfer'], a: 'A hotel transfer is available on request — just ask when booking.' },\n      { kw: ['room', 'rooms', 'apartment'], a: 'We have six cosy rooms: double, family and an apartment — each with central heating, a double bed and a sofa.' },\n      { kw: ['pet', 'dog', 'cat'], a: 'For stays with pets, please call us: 537 311 090 — we will sort out the details.' }\n    ]\n  };\n\n  function normalize(s){\n    return s.toLowerCase()\n      .replace(/ą/g,'a').replace(/ć/g,'c').replace(/ę/g,'e').replace(/ł/g,'l')\n      .replace(/ń/g,'n').replace(/ó/g,'o').replace(/ś/g,'s').replace(/[źż]/g,'z');\n  }\n\n  function findAnswer(text){\n    var n = normalize(text);\n    var list = FAQ[LANG] || FAQ.pl;\n    for (var i=0;i<list.length;i++){\n      var entry = list[i];\n      for (var j=0;j<entry.kw.length;j++){\n        if (n.indexOf(normalize(entry.kw[j])) !== -1) return entry.a;\n      }\n    }\n    return STR[LANG].fallback;\n  }\n\n  var panel = document.getElementById('ss-chat-panel');\n  var toggle = document.getElementById('ss-chat-toggle');\n  var closeBtn = document.getElementById('ss-chat-close');\n  var body = document.getElementById('ss-chat-body');\n  var quick = document.getElementById('ss-chat-quick');\n  var form = document.getElementById('ss-chat-form');\n  var input = document.getElementById('ss-chat-input');\n\n  input.placeholder = STR[LANG].placeholder;\n  form.querySelector('button[type=submit]').textContent = STR[LANG].send;\n\n  function addMsg(text, who){\n    var d = document.createElement('div');\n    d.className = 'ss-chat-msg ' + who;\n    d.textContent = text;\n    body.appendChild(d);\n    body.scrollTop = body.scrollHeight;\n  }\n\n  var opened = false;\n  function openChat(){\n    panel.hidden = false;\n    toggle.setAttribute('aria-expanded', 'true');\n    if (!opened){\n      opened = true;\n      addMsg(STR[LANG].greeting, 'bot');\n      STR[LANG].quick.forEach(function(label){\n        var b = document.createElement('button');\n        b.type = 'button';\n        b.textContent = label;\n        b.addEventListener('click', function(){ ask(label); });\n        quick.appendChild(b);\n      });\n    }\n    input.focus();\n  }\n  function closeChat(){\n    panel.hidden = true;\n    toggle.setAttribute('aria-expanded', 'false');\n  }\n\n  toggle.addEventListener('click', function(){ panel.hidden ? openChat() : closeChat(); });\n  closeBtn.addEventListener('click', closeChat);\n\n  function ask(text){\n    text = text.trim();\n    if (!text) return;\n    addMsg(text, 'user');\n    input.value = '';\n    setTimeout(function(){ addMsg(findAnswer(text), 'bot'); }, 400);\n  }\n\n  form.addEventListener('submit', function(e){\n    e.preventDefault();\n    ask(input.value);\n  });\n})();\n<\u002Fscript>\n<\u002Fbody><\u002Fhtml>"
  </script>
